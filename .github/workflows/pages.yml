name: Deploy Drift to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare project-page paths
        run: |
          sed -i 's|="/assets/|="./assets/|g' public/index.html
          sed -i 's|="/favicon.svg|="./favicon.svg|g' public/index.html
          sed -i 's|="/standalone.js|="./standalone.js|g' public/index.html
          sed -i 's|standalone.js"|standalone.js?v=hidden-room-v2"|g' public/index.html
          sed -i 's|</head>|<script src="./vendor/Tone.js?v=15.5.27" defer></script></head>|g' public/index.html
          sed -i 's|</head>|<link rel="stylesheet" href="./room.css?v=1"></head>|g' public/index.html
          touch public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
