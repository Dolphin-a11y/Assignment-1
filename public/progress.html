<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Drift — Your progress</title>
  <meta name="description" content="Your private Drift stress check-in progress.">
  <link rel="stylesheet" href="./progress.css?v=1">
</head>
<body>
  <main class="progress-page">
    <nav><a class="brand" href="./index.html"><span>◌</span> drift</a><a class="back-button" href="./index.html">← Back to check-in</a></nav>
    <section class="progress-hero">
      <div class="section-label"><span>02</span><strong>Your gentle progress</strong></div>
      <div class="progress-heading"><h1>Small shifts matter</h1><p>Saved only on this device. Look for patterns with curiosity, never pressure.</p></div>
      <div class="progress-panel">
        <div class="panel-head"><div><span>Recent check-ins</span><strong class="moment-title">Your journey starts here</strong></div><div class="average"><strong>—</strong><span>Average stress</span></div></div>
        <div class="progress-chart" aria-label="Recent stress level chart"></div>
        <p class="empty-message">Save a check-in on the main page to begin your private progress view.</p>
      </div>
      <div class="progress-actions"><a href="./index.html#top">Add another check-in</a><button type="button" class="clear-progress">Clear saved progress</button></div>
    </section>
  </main>
  <script src="./progress.js?v=1" defer></script>
</body>
</html>
